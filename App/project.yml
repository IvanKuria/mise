name: Mise
options:
  bundleIdPrefix: com.ivankuria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # TODO: set your Apple Developer Team ID (10-char, e.g. ABCDE12345).
    # Find it at https://developer.apple.com/account -> Membership.
    # Leave blank for local debug builds; REQUIRED for a Developer ID release.
    DEVELOPMENT_TEAM: ""
    # Automatic signing is fine for day-to-day Debug builds. For a
    # reproducible Developer ID release you typically switch to Manual
    # signing (see the Release config below and NOTARIZE.md). To force it
    # here, set: CODE_SIGN_STYLE: Manual
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Mise
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Unofficial. Not affiliated with Letterboxd."
    INFOPLIST_KEY_LSUIElement: YES
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Release:
      # Developer ID distribution (direct download / DMG), not Mac App Store.
      # Xcode resolves "Developer ID Application" to the matching cert in your
      # keychain. With Manual signing also set CODE_SIGN_STYLE: Manual and a
      # PROVISIONING_PROFILE_SPECIFIER if you use one (a Developer ID app does
      # not require a provisioning profile).
      CODE_SIGN_IDENTITY: "Developer ID Application"

packages:
  MiseCore:
    path: ../Packages/MiseCore
  LocalStore:
    path: ../Packages/LocalStore
  AppCore:
    path: ../Packages/AppCore
  TMDBKit:
    path: ../Packages/TMDBKit

targets:
  Mise:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivankuria.mise
        SWIFT_VERSION: "6.0"
        # App icon (Resources/Assets.xcassets/AppIcon.appiconset)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Hardened-runtime-friendly, non-sandboxed entitlements (Developer ID)
        CODE_SIGN_ENTITLEMENTS: Mise.entitlements
    dependencies:
      - package: AppCore
      - package: LocalStore
      - package: MiseCore
      - package: TMDBKit
