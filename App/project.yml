name: Mise
options:
  bundleIdPrefix: com.ivankuria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Mise
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Unofficial. Not affiliated with Letterboxd."
    ENABLE_HARDENED_RUNTIME: YES

packages:
  MiseCore:
    path: ../Packages/MiseCore
  MiseUI:
    path: ../Packages/MiseUI
  ThemeKit:
    path: ../Packages/ThemeKit
  AppCore:
    path: ../Packages/AppCore
  LocalStore:
    path: ../Packages/LocalStore
  OnboardingFeature:
    path: ../Packages/OnboardingFeature
  DashboardFeature:
    path: ../Packages/DashboardFeature
  BrowseFeature:
    path: ../Packages/BrowseFeature
  CompareFeature:
    path: ../Packages/CompareFeature
  WatchlistFeature:
    path: ../Packages/WatchlistFeature
  TasteCardFeature:
    path: ../Packages/TasteCardFeature
  ThemeStudioFeature:
    path: ../Packages/ThemeStudioFeature

targets:
  Mise:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivankuria.mise
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: MiseCore
      - package: MiseUI
      - package: ThemeKit
      - package: AppCore
      - package: LocalStore
      - package: OnboardingFeature
      - package: DashboardFeature
      - package: BrowseFeature
      - package: CompareFeature
      - package: WatchlistFeature
      - package: TasteCardFeature
      - package: ThemeStudioFeature
