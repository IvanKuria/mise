name: Mise
options:
  bundleIdPrefix: com.ivankuria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Mise
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Unofficial. Not affiliated with Letterboxd."
    INFOPLIST_KEY_LSUIElement: YES
    ENABLE_HARDENED_RUNTIME: YES

packages:
  MiseCore:
    path: ../Packages/MiseCore
  LocalStore:
    path: ../Packages/LocalStore
  AppCore:
    path: ../Packages/AppCore

targets:
  Mise:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivankuria.mise
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: AppCore
      - package: LocalStore
      - package: MiseCore
