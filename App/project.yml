name: Mise
options:
  bundleIdPrefix: com.ivankuria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # TODO: set your Apple Developer Team ID (10-char). Required for a
    # Developer ID release; leave blank for local debug builds.
    DEVELOPMENT_TEAM: "347LA37C2B"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    # Optional bundled TMDB key. Empty by default so source builds work without
    # secrets (posters then need a user key in Settings). The public release
    # injects a real value at build time via a gitignored Secrets.xcconfig:
    #   xcodebuild ... -xcconfig App/Secrets.xcconfig   (TMDB_API_KEY = ...)
    # It lands in Info.plist as TMDBAPIKey; AppState uses it as the default.
    TMDB_API_KEY: ""
  configs:
    Release:
      # Developer ID distribution (direct download / DMG), not Mac App Store.
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""

packages:
  MiseCore:
    path: ../Packages/MiseCore
  LocalStore:
    path: ../Packages/LocalStore
  AppCore:
    path: ../Packages/AppCore
  TMDBKit:
    path: ../Packages/TMDBKit

targets:
  Mise:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    info:
      path: Mise-Info.plist
      properties:
        CFBundleDisplayName: Mise
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.entertainment
        NSHumanReadableCopyright: "Unofficial. Not affiliated with Letterboxd."
        # Substituted from the TMDB_API_KEY build setting at build time.
        TMDBAPIKey: "$(TMDB_API_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivankuria.mise
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Mise.entitlements
    dependencies:
      - package: AppCore
      - package: LocalStore
      - package: MiseCore
      - package: TMDBKit
